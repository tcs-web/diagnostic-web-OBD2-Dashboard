<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JLR OBD2 Scanner</title>
<style>
body{font-family:'Poppins',sans-serif;background:#0f172a;color:#fff;padding:20px;text-align:center}
h1{color:#ec4899}
.btn{background:#ec4899;color:#fff;border:none;padding:14px 28px;border-radius:12px;font-size:16px;cursor:pointer;margin:10px}
.btn:hover{background:#db2777}
.card{background:#1e293b;padding:20px;border-radius:16px;margin:20px auto;max-width:400px}
#data{font-size:24px;color:#fbbf24;margin-top:16px}
#log{color:#94a3b8;font-size:12px;margin-top:20px;text-align:left;max-height:200px;overflow-y:auto;border:1px solid #334155;padding:10px}
</style>
</head>
<body>
<h1>JLR + Jaguar OBD2 Scanner</h1>
<p>⚠️ Turn ignition ON + start engine for live data</p>
<p>Chrome/Edge Desktop only. Needs USB ELM327 dongle</p>

<button class="btn" onclick="connectUSB()">Connect USB ELM327</button>

<div class="card">
  <h3>Live Data</h3>
  <div id="data">Not connected</div>
  <button class="btn" onclick="readRPM()">Read RPM</button>
  <button class="btn" onclick="readCodes()">Read Fault Codes</button>
  <button class="btn" onclick="clearCodes()">Clear Check Engine</button>
</div>

<div id="log">Waiting for connection...</div>

<script>
let port;

function log(msg) {
  const logDiv = document.getElementById('log');
  logDiv.innerHTML += new Date().toLocaleTimeString() + ': ' + msg + '<br>';
  logDiv.scrollTop = logDiv.scrollHeight;
}

async function connectUSB() {
  try {
    if(!('serial' in navigator)) {
      return log('❌ Web Serial not supported. Use Chrome/Edge on desktop');
    }
    port = await navigator.serial.requestPort();
    await port.open({ baudRate: 38400 });
    log('✅ USB ELM327 Connected');
    await initELM();
  } catch(e) { log('❌ Connect Error: ' + e.message); }
}

async function sendCommand(cmd) {
  if(!port) return log('Connect dongle first!');
  try {
    const writer = port.writable.getWriter();
    await writer.write(new TextEncoder().encode(cmd + '\r'));
    writer.releaseLock();

    await new Promise(r => setTimeout(r, 300));

    const reader = port.readable.getReader();
    const { value } = await reader.read();
    reader.releaseLock();

    return new TextDecoder().decode(value);
  } catch(e) {
    log('❌ Send Error: ' + e.message);
    return '';
  }
}

async function initELM() {
  log('Resetting ELM327...');
  await sendCommand('ATZ');
  await new Promise(r => setTimeout(r, 1000));
  await sendCommand('ATE0');
  await sendCommand('ATSP0');
  document.getElementById('data').innerText = 'Connected - Ready';
  log('✅ ELM327 Ready');
}

async function readRPM() {
  const res = await sendCommand('010C');
  log('Raw: ' + res);
  const match = res.match(/41 0C ([0-9A-F]{2}) ([0-9A-F]{2})/);
  if(match) {
    const rpm = (parseInt(match[1], 16) * 256 + parseInt(match[2], 16)) / 4;
    document.getElementById('data').innerText = Math.round(rpm) + ' RPM';
  } else {
    document.getElementById('data').innerText = 'No RPM data';
  }
}

async function readCodes() {
  const res = await sendCommand('03');
  log('Codes: ' + res);
  document.getElementById('data').innerText = res.includes('NO DATA')? 'No codes' : res;
}

async function clearCodes() {
  await sendCommand('04');
  document.getElementById('data').innerText = 'Codes Cleared';
  log('✅ Cleared');
}
</script>
</body>
</html>
